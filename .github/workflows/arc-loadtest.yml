name: arc-loadtest
on:
  workflow_dispatch:
jobs:
  load:
    strategy:
      fail-fast: false
      matrix:
        n: [1, 2, 3]
    runs-on: [self-hosted, pve, bark]
    steps:
      - name: burn a runner slot
        run: |
          echo "job ${{ matrix.n }} on $RUNNER_NAME  host=$(hostname)  kernel=$(uname -r)"
          sleep 180
          echo "done ${{ matrix.n }}"
