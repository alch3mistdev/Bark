name: test-k8s-runner
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: [self-hosted, pve, k8s]
    steps:
      - name: Identify the runner
        run: |
          echo "runner name : $RUNNER_NAME"
          echo "hostname    : $(hostname)"
          echo "kernel      : $(uname -a)"
      - name: Docker works (dind)
        run: docker version && docker run --rm hello-world
      - name: Checkout works
        uses: actions/checkout@v4
